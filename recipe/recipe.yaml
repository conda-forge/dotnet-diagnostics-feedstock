context:
  version: "11.0.100"

package:
  name: dotnet-diagnostics
  version: ${{ version }}

source:
  url: https://github.com/dotnet/diagnostics/archive/v${{ version }}.tar.gz
  sha256: 05480d0ae6e750c7b66663914f59e8ad7fe005233a4549e063dad10efc367b15

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
    - sed
  host:
    - dotnet
    - nuget-license
  run:
    - dotnet

tests:
  - script:
      - dotnet-counters --help
      - dotnet-dsrouter --help
      - dotnet-dump --help
      - dotnet-gcdump --help
      - dotnet-sos --help
      - dotnet-stack --help
      - dotnet-trace --help

about:
  license: MIT
  license_file:
    - LICENSE.TXT
    - license-files/
  summary: .NET Core runtime diagnostic tools
  homepage: https://github.com/dotnet/diagnostics
  repository: https://github.com/dotnet/diagnostics

extra:
  recipe-maintainers:
    - danielnachun
